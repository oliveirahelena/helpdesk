name: deploy-preview

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  preview:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.18"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build web artifact
        run: bun run --cwd apps/web build
      - name: Build api image
        run: docker build -f apps/api/Dockerfile -t helpdesk-api:preview .
      - name: Build workers image
        run: docker build -f apps/workers/Dockerfile -t helpdesk-workers:preview .
      - name: Preview deploy stub
        run: echo "Push artifacts to the staging target provider here."
